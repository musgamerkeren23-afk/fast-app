<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Fast Driver</title>
</head>
<body>

<h1>🔵 Fast Driver</h1>

<h3 id="orderBox">Menunggu order...</h3>

<button onclick="acceptOrder()">✅ Terima</button>
<button onclick="finishOrder()">🏁 Selesai</button>

<!-- FIREBASE -->
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyBBvm4Q6LKDrUwcyF4bwDuWKrEHlRwcWaU",
  authDomain: "fast--app.firebaseapp.com",
  databaseURL: "https://fast--app-default-rtdb.firebaseio.com",
  projectId: "fast--app",
  storageBucket: "fast--app.firebasestorage.app",
  messagingSenderId: "900506052647",
  appId: "1:900506052647:web:3050552184e2b3fc5e4602"
};

// ✅ FIX DOUBLE INIT
if (!firebase.apps.length) {
  firebase.initializeApp(firebaseConfig);
}
const db = firebase.database();
</script>

<script>
let currentOrder = null;

// 🔥 FSO REAL
db.ref("orders").on("value", (snap) => {
  const order = snap.val();

  if (!order) {
    document.getElementById("orderBox").innerText = "Belum ada order";
    return;
  }

  currentOrder = order;

  document.getElementById("orderBox").innerText =
    "🚨 " + order.user +
    "\n📍 " + order.from + " → " + order.to +
    "\n💰 Rp " + order.price +
    "\n📊 " + order.status;
});

// ACCEPT
function acceptOrder() {
  if (!currentOrder) return;

  db.ref("orders/status").set("🚗 Driver menuju lokasi...");
}

// FINISH
function finishOrder() {
  db.ref("orders").remove();
}
</script>

</body>
</html>
