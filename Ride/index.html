<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Fast Ride</title>
</head>
<body>

<h1>🟢 Fast Ride</h1>

<div id="login">
  <input id="username" placeholder="Nama">
  <button onclick="login()">Login</button>
</div>

<div id="app" style="display:none;">
  <button onclick="getLocation()">📍 Ambil Lokasi</button>
  <input id="from" placeholder="Dari">
  <input id="to" placeholder="Ke">
  <button onclick="order()">Pesan</button>

  <p id="status"></p>

  <div id="map" style="height:300px;"></div>

  <h3>💬 Chat</h3>
  <input id="chatInput">
  <button onclick="sendChat()">Kirim</button>
  <div id="chatBox"></div>
</div>

<!-- MAP -->
<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<!-- FIREBASE -->
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyBBvm4Q6LKDrUwcyF4bwDuWKrEHlRwcWaU",
  authDomain: "fast--app.firebaseapp.com",
  databaseURL: "https://fast--app-default-rtdb.firebaseio.com",
  projectId: "fast--app",
  appId: "1:900506052647:web:xxx"
};

if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
const db = firebase.database();

let userRealLat, userRealLng, map;

function login(){
  localStorage.setItem("user", username.value);
  login.style.display="none";
  app.style.display="block";
  initMap();
}

function initMap(lat=-6.2,lng=106.8){
  map = L.map('map').setView([lat,lng],13);
  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
}

function getLocation(){
  navigator.geolocation.getCurrentPosition(pos=>{
    userRealLat = pos.coords.latitude;
    userRealLng = pos.coords.longitude;

    map.setView([userRealLat,userRealLng],15);
    L.marker([userRealLat,userRealLng]).addTo(map);

    alert("GPS aktif 🔥");
  });
}

function order(){
  if(!userRealLat) return alert("Ambil lokasi dulu!");

  const data={
    user: localStorage.getItem("user"),
    from: from.value,
    to: to.value,
    lat:userRealLat,
    lng:userRealLng,
    price: Math.round(Math.random()*10000),
    status:"🚕 Mencari driver..."
  };

  db.ref("orders").set(data);
}

// STATUS
db.ref("orders").on("value",snap=>{
  const d=snap.val();
  if(!d) return status.innerText="Tidak ada order";
  status.innerText=d.status;
});

// CHAT
function sendChat(){
  db.ref("chat").push({
    user: localStorage.getItem("user"),
    msg: chatInput.value
  });
}

db.ref("chat").on("child_added",snap=>{
  const d=snap.val();
  chatBox.innerHTML += `<p><b>${d.user}:</b> ${d.msg}</p>`;
});
</script>

</body>
</html>
